<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vantage — Entrepreneurial OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #f5f4f0;
  --bg2: #ffffff;
  --bg3: #f0eeea;
  --bg4: #e8e6e1;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text: #1a1a1a;
  --text2: #555550;
  --text3: #999990;
  --accent: #5b4de0;
  --accent2: #7c6af7;
  --green: #1a8a52;
  --green-bg: rgba(26,138,82,0.08);
  --amber: #b06a10;
  --amber-bg: rgba(176,106,16,0.08);
  --red: #c03030;
  --red-bg: rgba(192,48,48,0.08);
  --blue: #1a6abf;
  --blue-bg: rgba(26,106,191,0.08);
  --radius: 10px;
  --radius-sm: 6px;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5}
body{min-height:100vh;padding:0}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#fff;letter-spacing:-.5px}
.logo-name{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-.3px}
.logo-sub{font-size:11px;color:var(--text3);margin-left:2px}
.topbar-right{display:flex;align-items:center;gap:10px}
.ts{font-size:11px;color:var(--text3);font-family:var(--mono)}
.btn{font-size:12px;padding:6px 14px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:var(--font);transition:all .15s}
.btn:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.btn-accent{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:500}
.btn-accent:hover{background:var(--accent2);border-color:var(--accent2);color:#fff}

/* MAIN */
.main{padding:20px 24px}
.drag-hint{font-size:11px;color:var(--text3);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.drag-hint::before{content:'';display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--accent);opacity:.6}

/* PIPELINE */
.pipe-wrap{overflow-x:auto;padding-bottom:6px;margin-bottom:16px}
.pipeline{display:flex;align-items:flex-start;min-width:max-content;gap:0}
.stage-col{width:160px;flex-shrink:0}
.stage-head{padding:6px 8px 10px;text-align:center}
.stage-pill{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;padding:3px 10px;border-radius:20px;display:inline-block;white-space:nowrap;border:1px solid transparent}
.stage-ct{font-size:10px;color:var(--text3);margin-top:3px;font-family:var(--mono)}
.stage-body{padding:4px 6px;min-height:60px}
.stage-body.drag-over{outline:1.5px dashed var(--green);border-radius:var(--radius);background:var(--green-bg)}
.sdiv{width:1px;background:var(--border);margin-top:36px;flex-shrink:0}

/* PROJECT CARD */
.pcard{border-radius:var(--radius);padding:10px 11px;margin-bottom:8px;border:1px solid transparent;cursor:grab;user-select:none;transition:border-color .15s,opacity .15s;position:relative;overflow:hidden}
.pcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:.8}
.pcard.dragging{opacity:.25;cursor:grabbing}
.pcard:hover{border-color:var(--border2)}
.pcard-name{font-size:13px;font-weight:600;line-height:1.3;margin-bottom:2px}
.pcard-goal{font-size:10px;font-style:italic;margin-bottom:5px;opacity:.6;line-height:1.4}
.pbar-wrap{height:2px;border-radius:2px;background:rgba(255,255,255,.07);margin-bottom:7px;overflow:hidden}
.pbar{height:100%;border-radius:2px;transition:width .3s}
.pcard-people{display:flex;gap:2px;margin-bottom:4px}
.av{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600}
.card-meta{font-size:9px;opacity:.55;margin-bottom:6px;font-family:var(--mono)}
.card-btns{display:flex;gap:3px;flex-wrap:wrap}
.cbtn{font-size:9px;padding:3px 7px;border-radius:4px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);cursor:pointer;color:inherit;font-family:var(--font);transition:background .1s;font-weight:500}
.cbtn:hover{background:rgba(255,255,255,.12)}
.cbtn-board{font-size:9px;padding:3px 8px;border-radius:4px;cursor:pointer;font-family:var(--font);font-weight:600;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1)}
.cbtn-board:hover{background:rgba(255,255,255,.18)}
.move-wrap{position:relative;display:inline-block}
.move-dd{display:none;position:absolute;top:calc(100% + 4px);left:0;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:4px;z-index:50;min-width:130px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.move-dd.open{display:block}
.move-opt{display:flex;align-items:center;gap:8px;font-size:11px;padding:6px 10px;border-radius:4px;cursor:pointer;white-space:nowrap;color:var(--text2)}
.move-opt:hover{background:var(--bg3);color:var(--text)}
.mdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* PANEL */
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin:6px 0 4px}
.ptabs{display:flex;gap:2px;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px;flex-wrap:wrap}
.ptab{font-size:11px;padding:4px 10px;border-radius:5px;cursor:pointer;color:var(--text3);border:none;background:transparent;font-family:var(--font);transition:all .1s}
.ptab:hover{color:var(--text2)}
.ptab.on{background:var(--bg3);color:var(--text);font-weight:500}
.fl{display:flex;gap:10px;align-items:center;margin-bottom:8px}
.fl-lbl{font-size:11px;color:var(--text3);width:68px;flex-shrink:0}
input.fi,select.fi,textarea.fi{flex:1;font-size:12px;padding:6px 10px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg3);color:var(--text);font-family:var(--font);outline:none;transition:border-color .15s}
input.fi:focus,select.fi:focus,textarea.fi:focus{border-color:var(--accent)}
textarea.fi{resize:vertical;min-height:44px}
select.fi option{background:var(--bg3)}
.sec-title{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:8px}

/* TICKETS */
.tk-stats{display:flex;gap:8px;margin-bottom:10px}
.tk-stat{flex:1;background:var(--bg3);border-radius:var(--radius-sm);padding:8px 10px;text-align:center;border:1px solid var(--border)}
.tk-stat-n{font-size:18px;font-weight:600;color:var(--text)}
.tk-stat-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-top:1px}
.tickets-board{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.tk-col{background:var(--bg3);border-radius:var(--radius-sm);padding:8px;border:1px solid var(--border)}
.tk-col-head{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.ticket{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px;margin-bottom:6px;transition:border-color .1s}
.ticket:hover{border-color:var(--border2)}
.tk-id{font-size:9px;color:var(--text3);margin-bottom:3px;font-family:var(--mono)}
.tk-title{font-size:11px;font-weight:500;margin-bottom:5px;line-height:1.4;color:var(--text)}
.tk-meta{display:flex;gap:4px;align-items:center;flex-wrap:wrap;margin-bottom:5px}
.tk-pri{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:500;font-family:var(--mono)}
.pri-high{background:var(--red-bg);color:var(--red)}
.pri-med{background:var(--amber-bg);color:var(--amber)}
.pri-low{background:var(--green-bg);color:var(--green)}
.tk-move-btns{display:flex;gap:3px;flex-wrap:wrap}
.tk-mbtn{font-size:9px;padding:2px 6px;border-radius:3px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-family:var(--font);transition:all .1s}
.tk-mbtn:hover{background:var(--bg4);color:var(--text)}
.add-tk{display:flex;flex-direction:column;gap:5px;margin-top:6px}
.add-tk-row{display:flex;gap:4px}
.add-tk-row input{flex:1;font-size:11px;padding:4px 8px;border:1px solid var(--border2);border-radius:4px;background:var(--bg2);color:var(--text);font-family:var(--font);outline:none}
.add-tk-row input:focus{border-color:var(--accent)}
.add-tk-row select{font-size:10px;padding:4px 6px;border:1px solid var(--border2);border-radius:4px;background:var(--bg2);color:var(--text2);font-family:var(--font)}
.add-tk button{font-size:10px;padding:4px 10px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:var(--font);transition:all .1s}
.add-tk button:hover{background:var(--bg3);color:var(--text)}

/* CONTACTS */
.contact-card{background:var(--bg3);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;border:1px solid var(--border)}
.contact-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.contact-info{flex:1;min-width:0}
.contact-name{font-size:12px;font-weight:600;margin-bottom:1px}
.contact-role{font-size:10px;color:var(--text3);margin-bottom:4px}
.contact-tag{font-size:9px;padding:2px 7px;border-radius:20px;font-weight:500;display:inline-block}
.tag-team{background:var(--amber-bg);color:var(--amber)}
.tag-investor{background:var(--blue-bg);color:var(--blue)}
.tag-partner{background:rgba(124,106,247,.15);color:var(--accent2)}
.tag-client{background:var(--green-bg);color:var(--green)}
.tag-vendor{background:var(--bg4);color:var(--text2)}
.tag-press{background:var(--red-bg);color:var(--red)}
.add-contact{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}
.add-contact input,.add-contact select{font-size:11px;padding:5px 8px;border:1px solid var(--border2);border-radius:5px;background:var(--bg3);color:var(--text);font-family:var(--font);outline:none}
.add-contact input:focus{border-color:var(--accent)}
.add-contact-full{grid-column:1/-1}

/* FINANCES */
.fin-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.fin-card{background:var(--bg3);border-radius:var(--radius-sm);padding:10px 12px;border:1px solid var(--border)}
.fin-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:4px}
.fin-val{font-size:18px;font-weight:600;font-family:var(--mono)}
.fin-val.green{color:var(--green)}.fin-val.red{color:var(--red)}
.fin-table{width:100%;border-collapse:collapse;margin-bottom:10px}
.fin-table th{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);padding:6px 8px;text-align:left;border-bottom:1px solid var(--border)}
.fin-table td{font-size:11px;padding:7px 8px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text2)}
.fin-table tr:last-child td{border-bottom:none}
.fin-type{font-size:9px;padding:2px 7px;border-radius:3px;font-weight:500}
.type-revenue{background:var(--green-bg);color:var(--green)}
.type-expense{background:var(--red-bg);color:var(--red)}
.type-investment{background:var(--blue-bg);color:var(--blue)}
.type-grant{background:rgba(124,106,247,.15);color:var(--accent2)}
.add-fin{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:6px;margin-top:6px;align-items:center}
.add-fin input,.add-fin select{font-size:11px;padding:5px 8px;border:1px solid var(--border2);border-radius:5px;background:var(--bg3);color:var(--text);font-family:var(--font);outline:none}
.add-fin button{font-size:11px;padding:5px 10px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:var(--font);white-space:nowrap;transition:all .1s}
.add-fin button:hover{background:var(--bg3);color:var(--text)}

/* CONVO */
.goal-box{background:var(--bg3);border-left:3px solid var(--green);padding:10px 14px;margin-bottom:12px;border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.convo-sect{margin-bottom:12px}
.convo-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:6px}
.item-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:5px}
.item-cb{width:14px;height:14px;margin-top:1px;cursor:pointer;flex-shrink:0;accent-color:var(--green)}
.item-txt{font-size:11px;flex:1;line-height:1.5;color:var(--text2)}
.item-txt.done{text-decoration:line-through;color:var(--text3)}
.item-rm{font-size:13px;color:var(--text3);cursor:pointer;border:none;background:transparent;line-height:1;transition:color .1s}
.item-rm:hover{color:var(--red)}
.add-item{display:flex;gap:5px;margin-top:5px}
.add-item input{flex:1;font-size:11px;padding:4px 8px;border:1px solid var(--border2);border-radius:5px;background:var(--bg3);color:var(--text);font-family:var(--font);outline:none}
.add-item input:focus{border-color:var(--accent)}
.add-item button{font-size:10px;padding:4px 9px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:var(--font);transition:all .1s}
.add-item button:hover{background:var(--bg3);color:var(--text)}

/* TEAM */
.person-row{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid var(--border)}
.person-row:last-of-type{border-bottom:none}
.pname{font-size:11px;flex:1;color:var(--text2)}
.ptag{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:500}
.te{background:var(--blue-bg);color:var(--blue)}.tv{background:var(--bg4);color:var(--text3)}
.th{background:var(--amber-bg);color:var(--amber)}.tvis{background:var(--green-bg);color:var(--green)}
.tog{width:28px;height:16px;border-radius:8px;border:none;cursor:pointer;position:relative;flex-shrink:0;transition:background .2s}
.tog-on{background:var(--green)}.tog-off{background:var(--bg4)}
.tog::after{content:'';position:absolute;width:10px;height:10px;border-radius:50%;background:#fff;top:3px;transition:left .15s}
.tog-on::after{left:15px}.tog-off::after{left:3px}
.psel{font-size:10px;padding:3px 5px;border:1px solid var(--border2);border-radius:4px;background:var(--bg3);color:var(--text2);font-family:var(--font)}
.rm{font-size:14px;color:var(--text3);cursor:pointer;border:none;background:transparent;line-height:1;transition:color .1s}
.rm:hover{color:var(--red)}
.add-pr{display:flex;gap:5px;margin-top:8px}
.add-pr input,.add-pr select{font-size:11px;padding:4px 8px;border:1px solid var(--border2);border-radius:5px;background:var(--bg3);color:var(--text);font-family:var(--font);outline:none}
.add-pr input{flex:1}
.add-pr input:focus{border-color:var(--accent)}
.add-pr button{font-size:10px;padding:4px 9px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:var(--font);transition:all .1s}
.add-pr button:hover{background:var(--bg3);color:var(--text)}

/* COLOR SWATCHES */
.color-grid{display:flex;gap:6px;flex-wrap:wrap}
.cswatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s}
.cswatch:hover{transform:scale(1.15)}
.cswatch.sel{border-color:rgba(255,255,255,.7)}

/* SUB-BOARD */
.subboard-wrap{background:var(--bg2);border-radius:var(--radius);padding:12px 14px;margin:6px 0 4px;border:1px solid var(--border)}
.subboard-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.subboard-title{font-size:12px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
.subboard-header-btns{display:flex;gap:6px;align-items:center}
.sub-pipeline{display:flex;overflow-x:auto;gap:0;padding-bottom:4px}
.sub-stage-col{min-width:130px;flex-shrink:0}
.sub-stage-head{padding:4px 6px 7px;text-align:center}
.sub-stage-pill{font-size:9px;font-weight:500;padding:2px 9px;border-radius:20px;display:inline-block;white-space:nowrap;text-transform:uppercase;letter-spacing:.06em;border:1px solid transparent}
.sub-stage-body{padding:3px 5px;min-height:40px}
.sub-stage-body.drag-over{outline:1.5px dashed var(--green);border-radius:8px;background:var(--green-bg)}
.sub-sdiv{width:1px;background:var(--border);margin-top:28px;flex-shrink:0}
.sub-card{border-radius:var(--radius-sm);padding:8px 9px;margin-bottom:6px;border:1px solid transparent;cursor:grab;user-select:none;transition:border-color .1s}
.sub-card:hover{border-color:var(--border2)}
.sub-card.dragging{opacity:.25;cursor:grabbing}
.sub-card-name{font-size:11px;font-weight:600;margin-bottom:2px;line-height:1.3}
.sub-card-desc{font-size:10px;opacity:.55;margin-bottom:5px;line-height:1.3}
.sub-card-btns{display:flex;gap:3px;flex-wrap:wrap}
.scbtn{font-size:9px;padding:2px 6px;border-radius:3px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);cursor:pointer;color:inherit;font-family:var(--font);transition:background .1s}
.scbtn:hover{background:rgba(255,255,255,.12)}
.sub-move-wrap{position:relative;display:inline-block}
.sub-move-dd{display:none;position:absolute;top:calc(100% + 3px);left:0;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:4px;z-index:60;min-width:100px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.sub-move-dd.open{display:block}
.sub-note-panel{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;margin:5px 0 3px}
.sub-notes-area{width:100%;font-size:11px;padding:6px 9px;border:1px solid var(--border2);border-radius:5px;background:var(--bg2);color:var(--text);font-family:var(--font);resize:vertical;min-height:60px;margin-bottom:7px;outline:none}
.sub-notes-area:focus{border-color:var(--accent)}
.sub-tk-col{background:var(--bg3);border-radius:5px;padding:7px;border:1px solid var(--border)}
.sub-tk-col-head{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:5px;display:flex;align-items:center;justify-content:space-between}
.sub-ticket{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:6px 7px;margin-bottom:4px}
.sub-tk-title{font-size:10px;font-weight:500;margin-bottom:4px;line-height:1.3;color:var(--text2)}
.sub-tk-btns{display:flex;gap:2px}
.sub-tk-btn{font-size:9px;padding:2px 6px;border-radius:3px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-family:var(--font);transition:all .1s}
.sub-tk-btn:hover{background:var(--bg3);color:var(--text)}
.add-sub-tk{display:flex;gap:4px;margin-top:5px}
.add-sub-tk input{flex:1;font-size:10px;padding:3px 7px;border:1px solid var(--border2);border-radius:4px;background:var(--bg2);color:var(--text);font-family:var(--font);outline:none}
.add-sub-tk input:focus{border-color:var(--accent)}
.add-sub-tk button{font-size:9px;padding:3px 8px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:var(--font);transition:all .1s}
.add-sub-tk button:hover{background:var(--bg3);color:var(--text)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border2);padding:20px;width:100%;max-width:440px;box-shadow:0 24px 64px rgba(0,0,0,.5)}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

document.addEventListener('click',e=>{
  if(!e.target.closest('.move-wrap')&&!e.target.closest('.sub-move-wrap'))
    document.querySelectorAll('.move-dd.open,.sub-move-dd.open').forEach(m=>m.classList.remove('open'));
});
document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

function render(){
  const pipe=document.getElementById('pipeline');
  pipe.innerHTML='';
  STAGES.forEach((st,si)=>{
    const cards=projects.filter(p=>p.stage===st.id);
    const col=document.createElement('div');col.className='stage-col';
    col.innerHTML=`<div class="stage-head"><span class="stage-pill" style="background:${st.sc};color:${st.sf};border-color:${st.sf}44">${st.label}</span><div class="stage-ct">${cards.length}</div></div><div class="stage-body" id="sb-${st.id}" data-stage="${st.id}"></div>`;
    pipe.appendChild(col);
    if(si<STAGES.length-1){const d=document.createElement('div');d.className='sdiv';pipe.appendChild(d);}
  });
  projects.forEach(p=>{
    const body=document.getElementById('sb-'+p.stage);if(!body)return;
    const c=pc(p.color),st=sf(p.stage);
    const wrap=document.createElement('div');
    const avatars=p.people.map(per=>`<div class="av" style="background:${ac(per.name).bg};color:${ac(per.name).tc};opacity:${per.visible?1:.35}" title="${esc(per.name)}">${ini(per.name)}</div>`).join('');
    const otherStages=STAGES.filter(s=>s.id!==p.stage);
    const moveOpts=otherStages.map(s=>`<div class="move-opt" onclick="moveProj(${p.id},'${s.id}')"><span class="mdot" style="background:${s.sf}"></span>${s.label}</div>`).join('');
    const tkTodo=p.tickets.filter(t=>t.status==='todo').length;
    const tkIP=p.tickets.filter(t=>t.status==='inprogress').length;
    const tkDone=p.tickets.filter(t=>t.status==='done').length;
    wrap.innerHTML=`<div class="pcard" id="pc-${p.id}" style="background:${c.bg};border-color:${c.bd}" draggable="true" data-pid="${p.id}">
      <div style="position:absolute;top:0;left:0;right:0;height:2px;background:${c.bar};border-radius:8px 8px 0 0"></div>
      <div class="pbar-wrap" style="margin-top:4px"><div class="pbar" style="width:${st.pct}%;background:${c.bar}"></div></div>
      <div class="pcard-name" style="color:${c.tx}">${esc(p.name)}</div>
      ${p.goal?`<div class="pcard-goal" style="color:${c.tx}">${esc(p.goal.length>48?p.goal.slice(0,48)+'…':p.goal)}</div>`:''}
      ${avatars?`<div class="pcard-people">${avatars}</div>`:''}
      <div class="card-meta">${tkTodo}T · ${tkIP}IP · ${tkDone}D · ${p.subProjects.length} sub</div>
      <div class="card-btns">
        <button class="cbtn-board" style="color:${c.tx}" onclick="toggleSubBoard(${p.id})">⊞ Board</button>
        <button class="cbtn" style="color:${c.tx}" onclick="toggleDetail(${p.id},'tickets')">Tickets</button>
        <button class="cbtn" style="color:${c.tx}" onclick="toggleDetail(${p.id},'contacts')">Contacts</button>
        <button class="cbtn" style="color:${c.tx}" onclick="toggleDetail(${p.id},'finances')">Finances</button>
        <button class="cbtn" style="color:${c.tx}" onclick="toggleDetail(${p.id},'convo')">Convo</button>
        <button class="cbtn" style="color:${c.tx}" onclick="toggleDetail(${p.id},'info')">Edit</button>
        <div class="move-wrap"><button class="cbtn" style="color:${c.tx}" onclick="toggleMove(event,${p.id})">Move ▾</button><div class="move-dd" id="mv-${p.id}">${moveOpts}</div></div>
      </div>
    </div>
    <div id="sub-${p.id}"></div>
    <div id="det-${p.id}"></div>`;
    body.appendChild(wrap);
    if(p.openSubBoard)renderSubBoard(p);
    if(p.openTab)renderDetail(p);
  });
  wireDrag();stamp();
}

function wireDrag(){
  document.querySelectorAll('.pcard[draggable]').forEach(card=>{
    card.addEventListener('dragstart',e=>{dragId=parseInt(card.dataset.pid);setTimeout(()=>card.classList.add('dragging'),0);e.dataTransfer.effectAllowed='move';});
    card.addEventListener('dragend',()=>{card.classList.remove('dragging');document.querySelectorAll('.stage-body').forEach(b=>b.classList.remove('drag-over'));dragId=null;});
  });
  document.querySelectorAll('.stage-body').forEach(body=>{
    body.addEventListener('dragover',e=>{e.preventDefault();document.querySelectorAll('.stage-body').forEach(b=>b.classList.remove('drag-over'));body.classList.add('drag-over');});
    body.addEventListener('dragleave',()=>body.classList.remove('drag-over'));
    body.addEventListener('drop',e=>{e.preventDefault();body.classList.remove('drag-over');const ns=body.dataset.stage;if(dragId&&ns){projects=projects.map(p=>p.id===dragId?{...p,stage:ns}:p);dragId=null;render();}});
  });
}

function renderSubBoard(p){
  const el=document.getElementById('sub-'+p.id);if(!el)return;
  const c=pc(p.color);
  const stagesHTML=p.subStages.map((st,si)=>{
    const subs=p.subProjects.filter(sp=>sp.stage===st.id);
    const sc=SUB_COLORS[si%SUB_COLORS.length];
    const cards=subs.map(sp=>{
      const otherSS=p.subStages.filter(s=>s.id!==st.id);
      const moveOpts=otherSS.map(s=>`<div class="move-opt" style="font-size:10px;padding:4px 8px" onclick="moveSubProj(${p.id},'${sp.id}','${s.id}')"><span class="mdot" style="background:${sc.bd}"></span>${esc(s.label)}</div>`).join('');
      const taskCt=sp.tickets.filter(t=>t.status==='todo').length;
      const doneCt=sp.tickets.filter(t=>t.status==='done').length;
      return `<div class="sub-card" style="background:${sc.bg};border-color:${sc.bd}">
        <div class="sub-card-name" style="color:${sc.tx}">${esc(sp.name)}</div>
        ${sp.desc?`<div class="sub-card-desc" style="color:${sc.tx}">${esc(sp.desc.length>42?sp.desc.slice(0,42)+'…':sp.desc)}</div>`:''}
        ${sp.tickets.length>0?`<div style="font-size:9px;color:${sc.tx};opacity:.55;margin-bottom:4px;font-family:var(--mono)">${taskCt}T · ${doneCt}D</div>`:''}
        <div class="sub-card-btns">
          <button class="scbtn" style="color:${sc.tx}" onclick="toggleSubNote(${p.id},'${sp.id}')">Notes</button>
          <button class="scbtn" style="color:${sc.tx}" onclick="toggleSubTickets(${p.id},'${sp.id}')">Tasks</button>
          <div class="sub-move-wrap"><button class="scbtn" style="color:${sc.tx}" onclick="toggleSubMove(event,${p.id},'${sp.id}')">Move ▾</button><div class="sub-move-dd" id="smv-${p.id}-${sp.id}">${moveOpts}</div></div>
          <button class="scbtn" style="color:${sc.tx};border-color:rgba(240,96,96,.3)" onclick="removeSubProj(${p.id},'${sp.id}')">×</button>
        </div>
        <div id="snp-${p.id}-${sp.id}"></div>
      </div>`;
    }).join('')||`<div style="font-size:10px;color:var(--text3);padding:4px 2px">Empty</div>`;
    return `<div class="sub-stage-col">
      <div class="sub-stage-head"><span class="sub-stage-pill" style="background:${sc.bg};color:${sc.tx};border-color:${sc.bd}">${esc(st.label)}</span><div style="font-size:9px;color:var(--text3);margin-top:2px;font-family:var(--mono)">${subs.length}</div></div>
      <div class="sub-stage-body" id="ssb-${p.id}-${st.id}" data-pid="${p.id}" data-stage="${st.id}">${cards}</div>
    </div>${si<p.subStages.length-1?'<div class="sub-sdiv"></div>':''}`;
  }).join('');
  el.innerHTML=`<div class="subboard-wrap" style="border-color:${c.bd}">
    <div class="subboard-header">
      <div class="subboard-title"><span style="width:10px;height:10px;border-radius:3px;background:${c.bar};display:inline-block;flex-shrink:0"></span>${esc(p.name)} — board</div>
      <div class="subboard-header-btns">
        <button class="btn" style="font-size:10px;padding:4px 10px" onclick="openAddSubStage(${p.id})">+ Stage</button>
        <button class="btn btn-accent" style="font-size:10px;padding:4px 10px" onclick="openAddSubProj(${p.id})">+ Sub-project</button>
        <button class="btn" onclick="toggleSubBoard(${p.id})">✕ Close</button>
      </div>
    </div>
    <div class="sub-pipeline">${stagesHTML}</div>
  </div>`;
  wireSubDrag(p.id);
  p.subProjects.forEach(sp=>{
    if(sp._openNote)renderSubNote(p,sp);
    if(sp._openTickets)renderSubTickets(p,sp);
  });
}

function wireSubDrag(pid){
  document.querySelectorAll(`.sub-stage-body[data-pid="${pid}"]`).forEach(body=>{
    body.addEventListener('dragover',e=>{e.preventDefault();document.querySelectorAll(`.sub-stage-body[data-pid="${pid}"]`).forEach(b=>b.classList.remove('drag-over'));body.classList.add('drag-over');});
    body.addEventListener('dragleave',()=>body.classList.remove('drag-over'));
    body.addEventListener('drop',e=>{e.preventDefault();body.classList.remove('drag-over');const ns=body.dataset.stage;if(subDragId&&ns)moveSubProj(pid,subDragId,ns);});
  });
}

function renderSubNote(p,sp){

function renderDetail(p){
  const el=document.getElementById('det-'+p.id);if(!el)return;
  const TABS=['tickets','contacts','finances','convo','info'];
  const tabBar=TABS.map(t=>`<button class="ptab${p.openTab===t?' on':''}" onclick="setTab(${p.id},'${t}')">${t.charAt(0).toUpperCase()+t.slice(1)}</button>`).join('');

  if(p.openTab==='tickets'){
    const cols=['todo','inprogress','done'];const cL={todo:'To do',inprogress:'In progress',done:'Done'};
    const stats=cols.map(s=>p.tickets.filter(t=>t.status===s).length);
    const board=cols.map(status=>{
      const tks=p.tickets.filter(t=>t.status===status);
      const tkHTML=tks.map(t=>{const ri=p.tickets.indexOf(t);const canL=status!=='todo',canR=status!=='done';const lS=status==='inprogress'?'todo':'inprogress',rS=status==='todo'?'inprogress':'done';
        return `<div class="ticket"><div class="tk-id">${esc(t.id)}</div><div class="tk-title">${esc(t.title)}</div><div class="tk-meta"><span class="tk-pri pri-${t.priority}">${t.priority}</span></div><div class="tk-move-btns">${canL?`<button class="tk-mbtn" onclick="moveTk(${p.id},${ri},'${lS}')">← ${cL[lS]}</button>`:''}${canR?`<button class="tk-mbtn" onclick="moveTk(${p.id},${ri},'${rS}')">→ ${cL[rS]}</button>`:''}<button class="tk-mbtn" style="color:var(--red)" onclick="rmTk(${p.id},${ri})">×</button></div></div>`;
      }).join('')||`<div style="font-size:10px;color:var(--text3);padding:6px 0">Empty</div>`;
      return `<div class="tk-col"><div class="tk-col-head">${cL[status]}<span style="font-weight:400;color:var(--text3);text-transform:none;letter-spacing:0;font-family:var(--mono)">${tks.length}</span></div>${tkHTML}${status==='todo'?`<div class="add-tk"><div class="add-tk-row"><input id="tki-${p.id}" placeholder="New ticket..." onkeydown="if(event.key==='Enter')addTk(${p.id})"/><select id="tkp-${p.id}"><option value="high">High</option><option value="med" selected>Med</option><option value="low">Low</option></select></div><button onclick="addTk(${p.id})">+ Add ticket</button></div>`:''}</div>`;
    }).join('');
    el.innerHTML=`<div class="panel"><div class="ptabs">${tabBar}</div><div class="tk-stats">${cols.map((s,i)=>`<div class="tk-stat"><div class="tk-stat-n">${stats[i]}</div><div class="tk-stat-l">${cL[s]}</div></div>`).join('')}</div><div class="tickets-board">${board}</div><div style="display:flex;justify-content:flex-end"><button class="btn" onclick="closeDetail(${p.id})">Close</button></div></div>`;

  }else if(p.openTab==='contacts'){
    const cards=p.contacts.map((ct,i)=>{const a=ac(ct.name);return `<div class="contact-card"><div class="contact-av" style="background:${a.bg};color:${a.tc}">${ini(ct.name)}</div><div class="contact-info"><div class="contact-name">${esc(ct.name)}</div><div class="contact-role">${esc(ct.role)}</div>${ct.notes?`<div style="font-size:10px;color:var(--text3);margin-top:2px;font-style:italic">${esc(ct.notes)}</div>`:''}<span class="contact-tag tag-${ct.type}">${ct.type}</span></div><button class="rm" onclick="rmContact(${p.id},${i})">×</button></div>`;}).join('')||`<div style="font-size:12px;color:var(--text3);margin-bottom:10px">No contacts yet.</div>`;
    el.innerHTML=`<div class="panel"><div class="ptabs">${tabBar}</div>${cards}<div class="add-contact"><input id="cn-${p.id}" class="add-contact-full" placeholder="Name..." onkeydown="if(event.key==='Enter')addContact(${p.id})"/><input id="cr-${p.id}" placeholder="Role / title..."/><input id="ce-${p.id}" placeholder="Email..."/><select id="ct-${p.id}">${CONTACT_TYPES.map(t=>`<option value="${t}">${t}</option>`).join('')}</select><input id="cno-${p.id}" placeholder="Notes..."/><button class="add-contact-full btn" onclick="addContact(${p.id})" style="padding:6px">+ Add contact</button></div><div style="display:flex;justify-content:flex-end;margin-top:10px"><button class="btn" onclick="closeDetail(${p.id})">Close</button></div></div>`;

  }else if(p.openTab==='finances'){
    const revenue=p.finances.filter(f=>f.type==='revenue'||f.type==='investment').reduce((s,f)=>s+Number(f.amount||0),0);
    const expenses=p.finances.filter(f=>f.type==='expense').reduce((s,f)=>s+Number(f.amount||0),0);
    const net=revenue-expenses;
    const rows=p.finances.map((f,i)=>`<tr><td style="color:var(--text)">${esc(f.desc)}</td><td><span class="fin-type type-${f.type}">${f.type}</span></td><td style="text-align:right;font-family:var(--mono);color:var(--text)">${fmt$(f.amount)}</td><td>${esc(f.status)}</td><td><button class="rm" onclick="rmFin(${p.id},${i})">×</button></td></tr>`).join('')||`<tr><td colspan="5" style="color:var(--text3);padding:10px 0">No entries yet.</td></tr>`;
    el.innerHTML=`<div class="panel"><div class="ptabs">${tabBar}</div><div class="fin-summary"><div class="fin-card"><div class="fin-lbl">Revenue / funding</div><div class="fin-val green">${fmt$(revenue)}</div></div><div class="fin-card"><div class="fin-lbl">Expenses</div><div class="fin-val red">${fmt$(expenses)}</div></div><div class="fin-card"><div class="fin-lbl">Net</div><div class="fin-val ${net>=0?'green':'red'}">${fmt$(net)}</div></div></div><table class="fin-table"><thead><tr><th>Description</th><th>Type</th><th style="text-align:right">Amount</th><th>Status</th><th></th></tr></thead><tbody>${rows}</tbody></table><div class="add-fin"><input id="fd-${p.id}" placeholder="Description..."/><select id="ft-${p.id}">${FIN_TYPES.map(t=>`<option value="${t}">${t}</option>`).join('')}</select><input id="fa-${p.id}" type="number" placeholder="Amount" min="0"/><button onclick="addFin(${p.id})">+ Add</button></div><div style="display:flex;justify-content:flex-end;margin-top:10px"><button class="btn" onclick="closeDetail(${p.id})">Close</button></div></div>`;

  }else if(p.openTab==='convo'){
    const goalBox=`<div class="goal-box"><div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">Project goal</div><input class="fi" style="font-size:12px" value="${esc(p.goal||'')}" placeholder="Define success clearly..." onchange="updateField(${p.id},'goal',this.value)"/></div>`;
    const sections=CTOPICS.map(topic=>{const items=(p.convo[topic]||'').split('\n').filter(x=>x.trim());const rows=items.map((item,ii)=>{const done=item.startsWith('[x]');const txt=done?item.slice(3).trim():item;return `<div class="item-row"><input type="checkbox" class="item-cb" ${done?'checked':''} onchange="toggleItem(${p.id},'${topic}',${ii},this.checked)"/><span class="item-txt${done?' done':''}">${esc(txt)}</span><button class="item-rm" onclick="removeItem(${p.id},'${topic}',${ii})">×</button></div>`;}).join('');return `<div class="convo-sect"><div class="convo-lbl">${topic}</div>${rows||`<div style="font-size:11px;color:var(--text3);margin-bottom:4px">Nothing yet.</div>`}<div class="add-item"><input id="ci-${p.id}-${topic.replace(/\s/g,'_')}" placeholder="Add item..." onkeydown="if(event.key==='Enter')addItem(${p.id},'${topic}')"/><button onclick="addItem(${p.id},'${topic}')">+ Add</button></div></div>`;}).join('');
    el.innerHTML=`<div class="panel"><div class="ptabs">${tabBar}</div>${goalBox}${sections}<div style="display:flex;justify-content:flex-end;margin-top:8px"><button class="btn" onclick="closeDetail(${p.id})">Close</button></div></div>`;

  }else if(p.openTab==='info'){
    const stOpts=STAGES.map(s=>`<option value="${s.id}"${s.id===p.stage?' selected':''}>${s.label}</option>`).join('');
    const swatches=PC.map((col,i)=>`<div class="cswatch${p.color===i?' sel':''}" style="background:${col.bg};outline:1.5px solid ${col.bd};border-color:${p.color===i?'rgba(255,255,255,.6)':'transparent'}" onclick="updateField(${p.id},'color',${i})"></div>`).join('');
    const prows=p.people.map((per,i)=>`<div class="person-row"><div class="av" style="background:${ac(per.name).bg};color:${ac(per.name).tc};width:22px;height:22px;font-size:9px">${ini(per.name)}</div><span class="pname">${esc(per.name)}</span><select class="psel" onchange="setPerm(${p.id},${i},this.value)"><option value="viewer"${per.perm==='viewer'?' selected':''}>Viewer</option><option value="editor"${per.perm==='editor'?' selected':''}>Editor</option></select><span class="ptag ${per.perm==='editor'?'te':'tv'}">${per.perm}</span><button class="tog ${per.visible?'tog-on':'tog-off'}" onclick="toggleVis(${p.id},${i})"></button><span class="ptag ${per.visible?'tvis':'th'}">${per.visible?'vis':'hidden'}</span><button class="rm" onclick="rmPerson(${p.id},${i})">×</button></div>`).join('');
    el.innerHTML=`<div class="panel"><div class="ptabs">${tabBar}</div><div class="fl"><span class="fl-lbl">Name</span><input class="fi" value="${esc(p.name)}" onchange="updateField(${p.id},'name',this.value)"/></div><div class="fl"><span class="fl-lbl">Stage</span><select class="fi" onchange="updateField(${p.id},'stage',this.value)">${stOpts}</select></div><div class="fl"><span class="fl-lbl">Summary</span><input class="fi" value="${esc(p.desc)}" onchange="updateField(${p.id},'desc',this.value)"/></div><div class="fl"><span class="fl-lbl">Goal</span><input class="fi" value="${esc(p.goal||'')}" placeholder="What does success look like?" onchange="updateField(${p.id},'goal',this.value)"/></div><div class="fl" style="align-items:flex-start"><span class="fl-lbl" style="padding-top:4px">Color</span><div class="color-grid">${swatches}</div></div><div style="margin-top:10px;border-top:1px solid var(--border);padding-top:10px"><div class="sec-title">Team access</div>${prows||'<div style="font-size:11px;color:var(--text3);margin-bottom:8px">No team members.</div>'}<div class="add-pr"><input id="ni-${p.id}" placeholder="Name or email..." onkeydown="if(event.key==='Enter')addPerson(${p.id})"/><select id="np-${p.id}"><option value="viewer">Viewer</option><option value="editor">Editor</option></select><button onclick="addPerson(${p.id})">+ Invite</button></div></div><div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px"><button class="btn" style="color:var(--red);border-color:rgba(240,96,96,.3)" onclick="deleteProject(${p.id})">Delete</button><button class="btn" onclick="closeDetail(${p.id})">Close</button></div></div>`;
  }
}

function toggleDetail(id,tab){projects=projects.map(p=>p.id===id?{...p,openTab:p.openTab===tab?null:tab,openSubBoard:false}:p);render();}
function closeDetail(id){projects=projects.map(p=>p.id===id?{...p,openTab:null}:p);render();}

function moveTk(pid,idx,status){projects=projects.map(p=>{if(p.id!==pid)return p;const tks=[...p.tickets];tks[idx]={...tks[idx],status};return{...p,tickets:tks};});render();}
function rmTk(pid,idx){projects=projects.map(p=>{if(p.id!==pid)return p;return{...p,tickets:p.tickets.filter((_,i)=>i!==idx)};});render();}

function addContact(pid){const n=document.getElementById('cn-'+pid).value.trim();if(!n)return;const r=document.getElementById('cr-'+pid).value.trim();const e=document.getElementById('ce-'+pid).value.trim();const t=document.getElementById('ct-'+pid).value;const no=document.getElementById('cno-'+pid).value.trim();projects=projects.map(p=>{if(p.id!==pid)return p;return{...p,contacts:[...p.contacts,{name:n,role:r,email:e,phone:'',type:t,notes:no}]};});render();}
function rmContact(pid,idx){projects=projects.map(p=>{if(p.id!==pid)return p;return{...p,contacts:p.contacts.filter((_,i)=>i!==idx)};});render();}
function addFin(pid){const d=document.getElementById('fd-'+pid).value.trim();if(!d)return;const t=document.getElementById('ft-'+pid).value;const a=parseFloat(document.getElementById('fa-'+pid).value)||0;projects=projects.map(p=>{if(p.id!==pid)return p;return{...p,finances:[...p.finances,{id:'f'+Date.now(),desc:d,type:t,amount:a,status:'entered'}]};});render();}
function rmFin(pid,idx){projects=projects.map(p=>{if(p.id!==pid)return p;return{...p,finances:p.finances.filter((_,i)=>i!==idx)};});render();}
function addItem(id,topic){const key='ci-'+id+'-'+topic.replace(/\s/g,'_');const inp=document.getElementById(key);if(!inp||!inp.value.trim())return;projects=projects.map(p=>{if(p.id!==id)return p;const ex=p.convo[topic]||'';return{...p,convo:{...p.convo,[topic]:ex?ex+'\n'+inp.value.trim():inp.value.trim()}};});render();}
function removeItem(id,topic,idx){projects=projects.map(p=>{if(p.id!==id)return p;const items=(p.convo[topic]||'').split('\n').filter(x=>x.trim());items.splice(idx,1);return{...p,convo:{...p.convo,[topic]:items.join('\n')}};});render();}
function toggleItem(id,topic,idx,checked){projects=projects.map(p=>{if(p.id!==id)return p;const items=(p.convo[topic]||'').split('\n').filter(x=>x.trim());const raw=items[idx].startsWith('[x]')?items[idx].slice(3).trim():items[idx];items[idx]=checked?'[x] '+raw:raw;return{...p,convo:{...p.convo,[topic]:items.join('\n')}};});render();}
function setPerm(id,i,val){projects=projects.map(p=>{if(p.id!==id)return p;const pp=[...p.people];pp[i]={...pp[i],perm:val};return{...p,people:pp};});render();}

function rmPerson(id,i){projects=projects.map(p=>{if(p.id!==id)return p;return{...p,people:p.people.filter((_,j)=>j!==i)};});render();}

function openAddSubStage(pid){
  document.getElementById('modal-inner').innerHTML=`<div class="modal-title">Add stage to sub-board</div><div class="fl"><span class="fl-lbl">Label</span><input class="fi" id="ss-label" placeholder="e.g. In review, Blocked, Testing..."/></div><div class="modal-acts"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-accent" onclick="saveSubStage(${pid})">Add stage</button></div>`;
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('ss-label').focus(),50);
}
function saveSubStage(pid){
  const label=document.getElementById('ss-label').value.trim();if(!label)return;
  projects=projects.map(p=>{if(p.id!==pid)return p;return{...p,subStages:[...p.subStages,{id:'ss'+Date.now(),label}]};});
  closeModal();renderSubBoard(projects.find(x=>x.id===pid));
}
function openAdd(){
  const swatches=PC.map((col,i)=>`<div class="cswatch" id="ncs-${i}" style="background:${col.bg};outline:1.5px solid ${col.bd}" onclick="selectNC(${i})"></div>`).join('');

function setLoading(msg){const el=document.getElementById('loading-screen');const ml=document.getElementById('loading-msg');if(el)el.style.display='flex';if(ml&&msg)ml.textContent=msg;}
function hideLoading(){const el=document.getElementById('loading-screen');if(el)el.style.display='none';}

function projectToRow(p){
  return {
    id: p.dbId || undefined,
    name: p.name,
    color: p.color,
    stage: p.stage,
    description: p.desc||'',
    goal: p.goal||'',
    convo: p.convo||{},
    tickets: p.tickets||[],
    contacts: p.contacts||[],
    finances: p.finances||[],
    people: p.people||[],
    sub_stages: p.subStages||[],
    sub_projects: p.subProjects||[],
    sort_order: p.id||0
  };
}

function rowToProject(row){
  return {
    id: row.sort_order||nextId++,
    dbId: row.id,
    name: row.name,
    color: row.color||0,
    stage: row.stage||'idea',
    desc: row.description||'',
    goal: row.goal||'',
    convo: row.convo||{Goal:'',Ideas:'',Financing:'',Marketing:'',Team:'',Timeline:'',Risks:'','Action items':''},
    tickets: (row.tickets||[]).map(t=>({...t})),
    contacts: row.contacts||[],
    finances: row.finances||[],
    people: row.people||[],
    subStages: row.sub_stages||[{id:'ss1',label:'Idea'},{id:'ss2',label:'In progress'},{id:'ss3',label:'Done'}],
    subProjects: (row.sub_projects||[]).map(sp=>({...sp,_openNote:false,_openTickets:false})),
    openSubBoard: false,
    openTab: null
  };
}

async function loadProjects(){
  setLoading('Loading your projects...');
  const {data,error}=await sb.from('projects').select('*').order('sort_order',{ascending:true});
  if(error){console.error('Load error:',error);hideLoading();render();return;}
  if(data&&data.length>0){
    projects=data.map(rowToProject);
    nextId=Math.max(...projects.map(p=>p.id))+1;
  }
  hideLoading();
  render();
}

async function saveProject(p){
  const row=projectToRow(p);
  if(p.dbId){
    const {error}=await sb.from('projects').update(row).eq('id',p.dbId);
    if(error)console.error('Save error:',error);
  } else {
    const {data,error}=await sb.from('projects').insert(row).select().single();
    if(error){console.error('Insert error:',error);return;}
    if(data){
      projects=projects.map(x=>x.id===p.id?{...x,dbId:data.id}:x);
    }
  }
}

async function deleteProjectDB(dbId){
  if(!dbId)return;
  const {error}=await sb.from('projects').delete().eq('id',dbId);
  if(error)console.error('Delete error:',error);
}

const _origUpdateField=updateField;
function updateField(id,field,val){
  const v=field==='color'?parseInt(val):val;
  projects=projects.map(p=>{
    if(p.id!==id)return p;
    const updated={...p,[field]:v};
    saveProject(updated);
    return updated;
  });
  render();
}

const _origDeleteProject=deleteProject;
function deleteProject(id){
  const p=projects.find(x=>x.id===id);
  if(p&&p.dbId)deleteProjectDB(p.dbId);
  projects=projects.filter(x=>x.id!==id);
  render();
}

const _origMoveProj=moveProj;
function moveProj(id,stage){
  projects=projects.map(p=>{
    if(p.id!==id)return p;
    const updated={...p,stage};
    saveProject(updated);
    return updated;
  });
  document.querySelectorAll('.move-dd.open').forEach(m=>m.classList.remove('open'));
  render();
}

const _origSaveNew=saveNew;
function saveNew(){
  const name=document.getElementById('m-name').value.trim();if(!name)return;
  const newP={id:nextId++,name,color:pendingColor,stage:document.getElementById('m-stage').value,
    desc:document.getElementById('m-desc').value.trim()||'No description',
    goal:document.getElementById('m-goal').value.trim(),
    subStages:[{id:'ss1',label:'Idea'},{id:'ss2',label:'In progress'},{id:'ss3',label:'Done'}],
    subProjects:[],openSubBoard:false,
    convo:{Goal:'',Ideas:'',Financing:'',Marketing:'',Team:'',Timeline:'',Risks:'','Action items':''},
    tickets:[],contacts:[],finances:[],people:[],openTab:null};
  projects.push(newP);
  colorIdx++;
  closeModal();
  render();

}

function autoSave(id){
  const p=projects.find(x=>x.id===id);
  if(p)saveProject(p);
}

const _origMoveTk=moveTk;
function moveTk(pid,idx,status){
  projects=projects.map(p=>{if(p.id!==pid)return p;const tks=[...p.tickets];tks[idx]={...tks[idx],status};const updated={...p,tickets:tks};saveProject(updated);return updated;});render();
}
const _origRmTk=rmTk;
function rmTk(pid,idx){
  projects=projects.map(p=>{if(p.id!==pid)return p;const updated={...p,tickets:p.tickets.filter((_,i)=>i!==idx)};saveProject(updated);return updated;});render();
}

const _origAddItem=addItem;
function addItem(id,topic){
  const key='ci-'+id+'-'+topic.replace(/\s/g,'_');const inp=document.getElementById(key);if(!inp||!inp.value.trim())return;
  projects=projects.map(p=>{if(p.id!==id)return p;const ex=p.convo[topic]||'';const updated={...p,convo:{...p.convo,[topic]:ex?ex+'\n'+inp.value.trim():inp.value.trim()}};saveProject(updated);return updated;});render();
}
const _origRemoveItem=removeItem;
function removeItem(id,topic,idx){
  projects=projects.map(p=>{if(p.id!==id)return p;const items=(p.convo[topic]||'').split('\n').filter(x=>x.trim());items.splice(idx,1);const updated={...p,convo:{...p.convo,[topic]:items.join('\n')}};saveProject(updated);return updated;});render();
}
const _origToggleItem=toggleItem;
function toggleItem(id,topic,idx,checked){
  projects=projects.map(p=>{if(p.id!==id)return p;const items=(p.convo[topic]||'').split('\n').filter(x=>x.trim());const raw=items[idx].startsWith('[x]')?items[idx].slice(3).trim():items[idx];items[idx]=checked?'[x] '+raw:raw;const updated={...p,convo:{...p.convo,[topic]:items.join('\n')}};saveProject(updated);return updated;});render();
}
const _origSetPerm=setPerm;
function setPerm(id,i,val){
  projects=projects.map(p=>{if(p.id!==id)return p;const pp=[...p.people];pp[i]={...pp[i],perm:val};const updated={...p,people:pp};saveProject(updated);return updated;});render();
}
const _origToggleVis=toggleVis;
function toggleVis(id,i){
  projects=projects.map(p=>{if(p.id!==id)return p;const pp=[...p.people];pp[i]={...pp[i],visible:!pp[i].visible};const updated={...p,people:pp};saveProject(updated);return updated;});render();
}
const _origRmPerson=rmPerson;
function rmPerson(id,i){
